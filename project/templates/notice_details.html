{% extends 'base.html' %}
{% block title %}{{ notice.title }} - East West University{% endblock %}
{% block content %}
<section class="py-5">
    <div class="container">
        <a href="{% url 'notice_list' %}" class="btn btn-outline-secondary mb-3">&larr; Back to Notices</a>
        <h1>{{ notice.title }}</h1>
        <p class="text-muted">Published on {{ notice.created_at|date:"F d, Y" }}</p>
        <hr>
        <p>{{ notice.description|linebreaks }}</p>
    </div>
</section>
{% endblock %}
