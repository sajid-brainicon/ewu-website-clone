{% extends 'base.html' %}
{% block title %}Departments - East West University{% endblock %}
{% block content %}
<section class="py-5">
    <div class="container">
        <h1 class="fw-bold mb-4 text-center">Our Departments</h1>
        <div class="row g-4">
            {% for dept in departments %}
            <div class="col-md-4 col-sm-6">
                <div class="card shadow-sm h-100 text-center dept-card">
                    <div class="card-body">
                        <i class="fa-solid {{ dept.icon }} fa-2x text-warning mb-3"></i>
                        <h5>{{ dept.name }}</h5>
                        <p class="small">{{ dept.desc }}</p>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
{% endblock %}
