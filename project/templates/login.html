{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - East West University</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0d3b6e, #1a5fa8);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            padding: 40px 35px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 25px;
        }
        .login-logo img {
            height: 70px;
        }
        h2 {
            text-align: center;
            color: #0d3b6e;
            margin-bottom: 8px;
        }
        p.subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #334155;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 15px;
        }
        input:focus {
            outline: none;
            border-color: #1a5fa8;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #0d3b6e;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-login:hover {
            background: #1a5fa8;
        }
        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            text-align: center;
        }
        .alert-error { background: #fee2e2; color: #b91c1c; }
        .alert-success { background: #ecfdf5; color: #0f766e; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <img src="https://www.ewubd.edu/themes/east-west-university/assets/default/images/logo.png" alt="EWU">
        </div>
        <h2>Login</h2>
        <p class="subtitle">East West University Portal</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Email Address</label>
                <input type="text" 
                    name="email" 
                    placeholder="Email or Username" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn-login">Sign In</button>
        </form>

        <p style="text-align:center; margin-top:20px; color:#64748b;">
            Don't have an account? 
            <a href="{% url 'student_register' %}" style="color:#1a5fa8;">Register as Student</a>
        </p>
    </div>
</body>
</html>
