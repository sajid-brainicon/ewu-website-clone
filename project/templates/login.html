{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — East West University</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        *{ margin:0; padding:0; box-sizing:border-box; }
        body{
            min-height:100vh;
            font-family:'Segoe UI',sans-serif;
            background: linear-gradient(rgba(0,0,0,.55), rgba(0,0,0,.55)),
                        url("{% static 'images/eew.jpg' %}");
            background-size:cover;
            background-position:center;
            display:flex;
            justify-content:flex-end;
            align-items:center;
        }
        .right-panel{
            width:480px;
            max-width:90%;
            margin-right:80px;
        }
        .form-box{
            background:rgba(255,255,255,.12);
            backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,.15);
            border-radius:24px;
            padding:40px;
            box-shadow:0 15px 40px rgba(0,0,0,.3);
        }
        .brand h1{
            color:#fff;
            font-size:28px;
            font-weight:800;
            margin-bottom:5px;
        }
        .brand p{
            color:rgba(255,255,255,.75);
            font-size:14px;
        }
        h2{
            font-size:28px;
            color:white;
            margin-bottom:6px;
        }
        .sub{
            color:rgba(255,255,255,.8);
            margin-bottom:24px;
            font-size:14px;
        }
        .msg{
            padding:12px;
            border-radius:10px;
            margin-bottom:16px;
            font-size:13px;
            display:flex;
            align-items:center;
            gap:10px;
        }
        .msg-error{ background:rgba(239,68,68,.15); color:#fff; border-left:4px solid #ef4444; }
        .msg-success{ background:rgba(34,197,94,.15); color:#fff; border-left:4px solid #22c55e; }

        .fg{
            margin-bottom:16px;
        }
        .fg label{
            display:block;
            color:white;
            margin-bottom:8px;
            font-size:13px;
            font-weight:600;
        }
        .input-wrap{
            position:relative;
        }
        .input-wrap i.icon{
            position:absolute;
            left:14px;
            top:50%;
            transform:translateY(-50%);
            color:rgba(255,255,255,.7);
        }
        .input-wrap input{
            width:100%;
            height:50px;
            padding-left:42px;
            border-radius:12px;
            border:1px solid rgba(255,255,255,.2);
            background:rgba(255,255,255,.08);
            color:white;
            outline:none;
            font-size:14px;
        }
        .input-wrap input:focus{
            border-color:white;
        }
        .btn-login{
            width:100%;
            height:52px;
            border:none;
            border-radius:12px;
            background:#c1121f;
            color:white;
            font-size:15px;
            font-weight:700;
            cursor:pointer;
            margin-top:8px;
            transition:.3s;
        }
        .btn-login:hover{
            background:#9b0d18;
        }
        .register-link{
            margin-top:18px;
            text-align:center;
            color:rgba(255,255,255,.8);
            font-size:13px;
        }
        .register-link a{
            color:white;
            font-weight:700;
            text-decoration:none;
        }
        .back-link{
            text-align:center;
            margin-top:12px;
        }
        .back-link a{
            color:rgba(255,255,255,.75);
            text-decoration:none;
        }
        @media(max-width:768px){
            body{ justify-content:center; padding:20px; }
            .right-panel{ margin-right:0; width:100%; }
        }
    </style>
</head>
<body>

<div class="right-panel">
    <div class="form-box">
        <div class="brand">
            <h1>East West University</h1>
        </div>

        <h2>Welcome Back</h2>
        <p class="sub">Sign in with your EWU account</p>

        {% if messages %}
            {% for msg in messages %}
            <div class="msg msg-{% if msg.tags == 'error' %}error{% else %}success{% endif %}">
                <i class="fa-solid fa-{% if msg.tags == 'error' %}circle-xmark{% else %}circle-check{% endif %}"></i>
                {{ msg }}
            </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="fg">
                <label>Username or Email</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-user icon"></i>
                    <input type="text" 
                           name="identifier" 
                           placeholder="student@std.ewubd.edu or admin username"
                           required 
                           autofocus>
                </div>
            </div>

            <div class="fg">
                <label>Password</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-lock icon"></i>
                    <input type="password" 
                           name="password" 
                           placeholder="Enter your password" 
                           required>
                </div>
            </div>

            <button type="submit" class="btn-login">
                <i class="fa-solid fa-right-to-bracket"></i> Sign In
            </button>
        </form>

        <div class="register-link">
            New student? 
            <a href="{% url 'student_register' %}">Create an account</a>
        </div>

        <div class="back-link">
            <a href="{% url 'home' %}">
                <i class="fa-solid fa-arrow-left"></i> Back to main site
            </a>
        </div>
    </div>
</div>

</body>
</html>
