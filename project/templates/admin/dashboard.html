{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - EWU</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        .admin-container { padding: 30px; max-width: 1300px; margin: 0 auto; }
        .dashboard-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid #eee;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        .stat-card h3 { font-size: 2.8rem; color: #1a3a8f; margin: 10px 0; }
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }
        .action-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .btn-manage {
            background: #1a3a8f;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
        }
    </style>
</head>
<body>
<div class="admin-container">
    <div class="dashboard-header">
        <h1>Admin Dashboard</h1>
        <a href="/admin/logout/" class="btn-manage" style="background:#e53935;">Logout</a>
    </div>

    <div class="stat-grid">
        <div class="stat-card">
            <i class="fa-solid fa-bullhorn fa-2x" style="color:#1a3a8f"></i>
            <h3>{{ total_notices }}</h3>
            <p>Total Notices</p>
        </div>
        <div class="stat-card">
            <i class="fa-solid fa-newspaper fa-2x" style="color:#1a3a8f"></i>
            <h3>{{ total_news }}</h3>
            <p>Total News</p>
        </div>
    </div>

    <div class="quick-actions">
        <div class="action-card">
            <h3>Notices Management</h3>
            <p>Manage all university notices and announcements</p>
            <a href="/admin/notices/" class="btn-manage">Manage Notices</a>
        </div>
        <div class="action-card">
            <h3>News Management</h3>
            <p>Manage latest news and updates</p>
            <a href="/admin/news/" class="btn-manage">Manage News</a>
        </div>
    </div>
</div>
</body>
</html>
