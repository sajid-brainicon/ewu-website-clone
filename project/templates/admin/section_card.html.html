<div style="background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;">
  <div style="display:flex;align-items:center;gap:10px;">
    <div style="width:36px;height:36px;border-radius:8px;background:{{ color }}1a;display:flex;align-items:center;justify-content:center;color:{{ color }};font-size:15px;flex-shrink:0;">
      <i class="fa-solid {{ icon }}"></i>
    </div>
    <div>
      <div style="font-size:14px;font-weight:700;color:#111827;">{{ label }}</div>
      <a href="{% url list_url %}" style="font-size:12px;color:#6b7280;">View all →</a>
    </div>
  </div>
  <a href="{% url create_url %}" class="btn btn-sm btn-primary" title="Create new {{ label }}">
    <i class="fa-solid fa-plus"></i>
  </a>
</div>
