{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if edit %}Edit{% else %}Create{% endif %} Notice</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        .form-container { max-width: 800px; margin: 30px auto; padding: 30px; background: white; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { padding: 14px 30px; background: #1a3a8f; color: white; border: none; border-radius: 8px; font-size: 16px; }
    </style>
</head>
<body>
<div class="form-container">
    <h1>{% if edit %}Edit Notice{% else %}Create New Notice{% endif %}</h1>
    <form method="POST">
        {% csrf_token %}
        <label>Title</label>
        <input type="text" name="title" value="{{ notice.title|default:'' }}" required>
        
        <label>Content</label>
        <textarea name="content" rows="10" required>{{ notice.content|default:'' }}</textarea>
        
        <button type="submit">Save Notice</button>
    </form>
</div>
</body>
</html>
