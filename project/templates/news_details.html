{% extends 'base.html' %}
{% block title %}{{ news.title }} - East West University{% endblock %}
{% block content %}
<section class="py-5">
    <div class="container">
        <a href="{% url 'news_list' %}" class="btn btn-outline-secondary mb-3">&larr; Back to News</a>
        <div class="row">
            <div class="col-lg-8">
                <img src="{{ news.image.url }}" class="img-fluid rounded mb-4" alt="{{ news.title }}">
                <h1>{{ news.title }}</h1>
                <p class="text-muted">{{ news.created_at|date:"F d, Y" }}</p>
                <hr>
                <p>{{ news.description|linebreaks }}</p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
